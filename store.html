<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MOMOREAD 订阅商店 - Moc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, .main-content, .modal-dialog, .works-grid {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        body::-webkit-scrollbar, .main-content::-webkit-scrollbar,
        .modal-dialog::-webkit-scrollbar, .works-grid::-webkit-scrollbar {
            display: none;
        }
        body {
            background: #f5f5f7;
            font-family: 'Inter', -apple-system, 'SF Pro Text', sans-serif;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            overflow: hidden;
            color: #1d1d1f;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
        /* 全局过渡变量 */
        :root {
            --transition-fast: 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --transition-normal: 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --hover-lift: -5px;
            --active-shrink: scale(0.97);
        }
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-title {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            cursor: default;
            padding: 6px 24px;
            border-radius: 40px;
            user-select: none;
            transition: all var(--transition-fast);
        }
        .main-content {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            height: calc(100vh - 72px);
            overflow-y: auto;
            padding: 24px 20px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .store-hero {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
        }
        .store-hero-title {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c2c, #0071e3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .store-hero-desc {
            font-size: 1.1rem;
            color: #6e6e73;
            margin-top: 8px;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 32px;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }
        .subscription-card {
            flex: 1 1 0;
            min-width: 280px;
            max-width: 580px;
            background: white;
            border-radius: 48px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.06);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .subscription-card:hover {
            transform: translateY(var(--hover-lift));
            box-shadow: 0 24px 48px rgba(0,0,0,0.12);
        }
        .subscription-card:active {
            transform: scale(0.98);
            transition-duration: 0.1s;
        }
        .card-image {
            background: #f2f2f5;
            height: 210px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            transition: background var(--transition-normal);
        }
        .subscription-card:hover .card-image {
            background: #e8e8ed;
        }
        .card-body {
            padding: 32px 28px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-category {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #b76e4b;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .card-desc {
            color: #6e6e73;
            margin-bottom: 24px;
            line-height: 1.4;
            flex: 1;
        }
        .card-price {
            font-weight: 600;
            color: #c3641e;
            font-size: 1.2rem;
            margin-bottom: 24px;
        }
        .btn-large {
            background: #0071e3;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background var(--transition-fast), transform var(--transition-fast);
        }
        .btn-large:hover { background: #005bb5; transform: scale(0.98); }
        .btn-large:active { transform: scale(0.96); transition-duration: 0.05s; }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.25s;
        }
        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-dialog {
            background: white;
            border-radius: 40px;
            max-width: 780px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px 24px 32px;
            transform: scale(0.96);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .modal-overlay.show .modal-dialog {
            transform: scale(1);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 24px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            transition: color var(--transition-fast), transform var(--transition-fast);
        }
        .modal-close:hover { color: #1d1d1f; transform: scale(1.1); }
        .modal-close:active { transform: scale(0.95); }
        .modal-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-right: 32px;
        }
        /* 作品网格 */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin: 24px 0;
        }
        .work-card, .delivery-card {
            background: white;
            border-radius: 28px;
            border: 1.5px solid #eceef2;
            padding: 18px 12px;
            position: relative;
            cursor: pointer;
            transition: all var(--transition-normal);
        }
        .work-card:hover, .delivery-card:hover {
            transform: translateY(var(--hover-lift));
            border-color: #0071e3;
            box-shadow: 0 16px 28px rgba(0,0,0,0.08);
        }
        .work-card:active, .delivery-card:active {
            transform: scale(0.98);
            transition-duration: 0.05s;
        }
        .work-card.selected, .delivery-card.selected {
            border-color: #0071e3;
            background: #f5faff;
        }
        .check-circle {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 24px;
            height: 24px;
            border-radius: 30px;
            background: white;
            border: 2px solid #c6c6c8;
            transition: all var(--transition-fast);
        }
        .work-card.selected .check-circle, .delivery-card.selected .check-circle {
            background: #0071e3;
            border-color: #0071e3;
        }
        .work-card.selected .check-circle::after, .delivery-card.selected .check-circle::after {
            content: "✓";
            display: block;
            color: white;
            font-size: 14px;
            text-align: center;
            line-height: 20px;
            font-weight: bold;
        }
        .work-emoji { font-size: 2.8rem; text-align: center; margin: 12px 0 8px; }
        .work-name { font-weight: 600; text-align: center; }
        .work-price { font-size: 0.8rem; color: #c3641e; text-align: center; margin-bottom: 14px; }
        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 6px;
        }
        .qty-btn {
            width: 38px;
            height: 38px;
            border-radius: 38px;
            background: #f2f2f5;
            border: none;
            font-size: 1.3rem;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition-fast), transform var(--transition-fast);
        }
        .qty-btn:hover {
            background: #e0e0e5;
            transform: scale(1.08);
        }
        .qty-btn:active {
            transform: scale(0.92);
            transition-duration: 0.05s;
        }
        .membership-option {
            background: white;
            border: 1.5px solid #eceef2;
            border-radius: 28px;
            padding: 14px 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all var(--transition-normal);
        }
        .membership-option:hover {
            transform: translateY(var(--hover-lift));
            border-color: #0071e3;
            box-shadow: 0 16px 28px rgba(0,0,0,0.08);
            background: #fafafc;
        }
        .membership-option:active {
            transform: scale(0.98);
        }
        .membership-option.selected {
            border-color: #0071e3;
            background: #f5faff;
            transform: scale(1.01);
        }
        .month-picker {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 12px 0;
        }
        .month-card {
            background: white;
            border-radius: 28px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-normal);
            border: 1.5px solid #eceef2;
            font-weight: 500;
        }
        .month-card:hover {
            transform: translateY(var(--hover-lift));
            border-color: #0071e3;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            background: #fafafc;
        }
        .month-card:active {
            transform: scale(0.97);
        }
        .month-card.selected {
            border-color: #0071e3;
            background: #f5faff;
            transform: scale(0.98);
        }
        .delivery-group {
            display: flex;
            gap: 18px;
            margin: 10px 0 20px;
        }
        .delivery-card {
            flex: 1;
            text-align: center;
            padding: 18px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .delivery-emoji { font-size: 2rem; }
        .delivery-label { font-weight: 600; }
        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        .form-group label { font-weight: 500; display: block; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #d4d4dc;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border var(--transition-fast), box-shadow var(--transition-fast);
        }
        .form-group input:focus {
            outline: none;
            border-color: #0071e3;
            box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
        }
        .invoice {
            background: #f8f8fc;
            border-radius: 28px;
            padding: 20px;
            margin: 20px 0;
            font-size: 0.95rem;
            transition: all var(--transition-fast);
        }
        .btn-primary {
            background: #0071e3;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
            transition: background var(--transition-fast), transform var(--transition-fast);
        }
        .btn-primary:hover { background: #005bb5; transform: scale(0.98); }
        .btn-primary:active { transform: scale(0.96); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #e8e8ed;
            color: #1d1d1f;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            transition: background var(--transition-fast), transform var(--transition-fast);
        }
        .btn-secondary:hover { background: #d9d9df; transform: scale(0.98); }
        .btn-secondary:active { transform: scale(0.96); }
        .wechat-card {
            background: #eef5e9;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            transition: transform var(--transition-normal);
        }
        .wechat-card:hover {
            transform: scale(1.01);
        }
        .wechat-id {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2a6e3b;
            letter-spacing: 1px;
            margin: 12px 0;
        }
        .order-summary {
            background: #f2f2f5;
            border-radius: 24px;
            padding: 14px;
            margin: 16px 0;
            word-break: break-word;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid #ddd;
            transition: background var(--transition-fast);
        }
        .order-summary:hover {
            background: #eaeaef;
        }
        .copy-btn-inside {
            background: #e0e0e5;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
            transition: background var(--transition-fast), transform var(--transition-fast);
        }
        .copy-btn-inside:hover {
            background: #cacad0;
            transform: scale(0.97);
        }
        .copy-btn-inside:active {
            transform: scale(0.94);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-step {
            animation: slideIn 0.35s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
        }
        @media (max-width: 780px) {
            .cards-container {
                flex-direction: column;
                align-items: center;
            }
            .subscription-card {
                width: 100%;
                max-width: 500px;
            }
        }
    </style>
</head>
<body>
<header class="site-header"><div class="header-title">Moc</div></header>
<div class="main-content">
    <div class="store-hero">
        <h1 class="store-hero-title">Moc 商店</h1>
        <p class="store-hero-desc">MOMOREAD 独家订阅 · 纸间温度 & 数字便捷</p>
    </div>
    <div class="cards-container">
        <div class="subscription-card" id="physicalCard">
            <div class="card-image">📮✨</div>
            <div class="card-body">
                <div class="card-category">文学 · 独家实体</div>
                <div class="card-title">莫川读书会 · 纸间订阅</div>
                <div class="card-desc">每周一封手写信件 + 原创小说 + 专属赠品<br>三档会员 · 按月寄送</div>
                <div class="card-price">0.99元 起 / 月</div>
                <button class="btn-large" id="openPhysicalBtn">开始实体订阅 →</button>
            </div>
        </div>
        <div class="subscription-card" id="digitalCard">
            <div class="card-image">💻✨</div>
            <div class="card-body">
                <div class="card-category">文学 · 线上订阅</div>
                <div class="card-title">莫川读书会 · 数字订阅</div>
                <div class="card-desc">每周邮件推送 + 原创小说电子版 + 兑换码<br>三档会员 · 即订即读</div>
                <div class="card-price">0.99元 起 / 月</div>
                <button class="btn-large" id="openDigitalBtn">开始线上订阅 →</button>
            </div>
        </div>
    </div>
</div>

<div id="subscribeModal" class="modal-overlay"><div class="modal-dialog" id="modalDialog"><button class="modal-close" id="modalCloseBtn">✕</button><div id="modalContent"></div></div></div>

<script>
(function(){
    const works = [
        { name: "非正式小组", price: 0.75, emoji: "🔍" },
        { name: "唐人探案", price: 0.75, emoji: "🐉" },
        { name: "崔氏二小生", price: 0.75, emoji: "👨‍🎓" },
        { name: "三号线", price: 0.50, emoji: "🚇" },
        { name: "德州金夫妻", price: 0.25, emoji: "💰" }
    ];
    const memberships = [
        { name: "一般读者", price: 0.99, printFee: 2 },
        { name: "26se (VIP)", price: 3.99, printFee: 1 },
        { name: "mailse", price: 1.99, printFee: 2, wechatOnly: true }
    ];
    const availableMonths = [
        { label: "2026年7月", value: "2026-07", year:2026, month:7 },
        { label: "2026年8月", value: "2026-08", year:2026, month:8 },
        { label: "2026年9月", value: "2026-09", year:2026, month:9 },
        { label: "2026年10月", value: "2026-10", year:2026, month:10 },
        { label: "2026年11月", value: "2026-11", year:2026, month:11 },
        { label: "2026年12月", value: "2026-12", year:2026, month:12 }
    ];

    let subscriptionType = 'physical';
    let step = 'works';
    let selectedWorks = [];
    let selectedMembership = null;
    let selectedStartMonth = null;
    let subscriptionMonths = 1;
    let deliveryMethod = 'address';
    let userInfo = { name: '', address: '', email: '' };
    let digitalEmail = '';

    const modal = document.getElementById('subscribeModal');
    const modalContent = document.getElementById('modalContent');
    const closeModalBtn = document.getElementById('modalCloseBtn');

    function closeModal() {
        modal.classList.remove('show');
        subscriptionType = 'physical';
        step = 'works';
        selectedWorks = [];
        selectedMembership = null;
        selectedStartMonth = null;
        subscriptionMonths = 1;
        deliveryMethod = 'address';
        userInfo = { name: '', address: '', email: '' };
        digitalEmail = '';
    }

    function openModal(type) {
        subscriptionType = type;
        step = 'works';
        selectedWorks = [];
        selectedMembership = null;
        selectedStartMonth = null;
        subscriptionMonths = 1;
        if (type === 'physical') {
            deliveryMethod = 'address';
            userInfo = { name: '', address: '', email: '' };
        } else {
            digitalEmail = '';
        }
        renderStep();
        modal.classList.add('show');
    }

    function isEachWorkMultipleOfFour() {
        for (let w of selectedWorks) {
            if (w.perMonthQuantity % 4 !== 0) return false;
        }
        return true;
    }
    function isTotalMonthlyValid() {
        let total = selectedWorks.reduce((s,w)=>s+w.perMonthQuantity,0);
        return total > 0 && isEachWorkMultipleOfFour();
    }
    function calcMonthlyWorksFee() {
        return selectedWorks.reduce((sum, w) => sum + w.price * w.perMonthQuantity, 0);
    }
    function calcTotalWorksFee() {
        return calcMonthlyWorksFee() * subscriptionMonths;
    }
    function calcMembershipTotal() {
        if (!selectedMembership) return 0;
        return selectedMembership.price * subscriptionMonths;
    }
    function calcPrintTotal() {
        if (subscriptionType === 'digital') return 0;
        if (!selectedMembership) return 0;
        return selectedMembership.printFee * subscriptionMonths;
    }
    function calcGrandTotal() {
        return calcTotalWorksFee() + calcMembershipTotal() + calcPrintTotal();
    }
    function isEndDateValid() {
        if (!selectedStartMonth) return true;
        const [year, month] = selectedStartMonth.split('-').map(Number);
        let endYear = year;
        let endMonth = month + subscriptionMonths - 1;
        if (endMonth > 12) { endYear += Math.floor((endMonth-1)/12); endMonth = ((endMonth-1)%12)+1; }
        if (endYear > 2026) return false;
        if (endYear === 2026 && endMonth > 12) return false;
        return true;
    }

    function renderWorksStep() {
        let worksHtml = `<div class="modal-title animate-step">📖 选择每月订阅的作品数量 (每个作品每月数量须为4的倍数)</div><div class="works-grid">`;
        works.forEach(work => {
            const selected = selectedWorks.find(w => w.name === work.name);
            const qty = selected ? selected.perMonthQuantity : 0;
            worksHtml += `<div class="work-card ${qty>0?'selected':''}" data-name="${work.name}" data-price="${work.price}"><div class="check-circle"></div><div class="work-emoji">${work.emoji}</div><div class="work-name">${work.name}</div><div class="work-price">${work.price}元/章</div><div class="quantity-control"><button class="qty-btn minus" data-name="${work.name}">-</button><span class="qty-num" data-name="${work.name}">${qty}</span><button class="qty-btn plus" data-name="${work.name}">+</button></div><div style="font-size:0.7rem; color:#777; text-align:center;">（每月数量）</div></div>`;
        });
        worksHtml += `</div>`;
        let totalMonthly = selectedWorks.reduce((s,w)=>s+w.perMonthQuantity,0);
        let allValid = isEachWorkMultipleOfFour() && totalMonthly > 0;
        worksHtml += `<div style="text-align:right; font-size:0.85rem; margin-bottom:12px;">每月总章节：${totalMonthly} 章 | ${allValid ? '✅ 有效' : '❌ 每个作品数量需为4的倍数且每月总数>0'}</div>`;
        worksHtml += `<button id="nextToMembershipBtn" class="btn-primary" ${!allValid ? 'disabled' : ''}>下一步：选择会员 →</button><button id="cancelWorksBtn" class="btn-secondary">取消</button>`;
        return worksHtml;
    }

    function renderMembershipStep() {
        let html = `<div class="modal-title animate-step">⭐ 选择会员 & 订阅时长</div>`;
        memberships.forEach(m => {
            const isSelected = selectedMembership && selectedMembership.name === m.name;
            html += `<div class="membership-option ${isSelected ? 'selected' : ''}" data-mem="${m.name}" data-price="${m.price}" data-print="${m.printFee}" data-wechat="${m.wechatOnly||false}"><div style="display:flex; justify-content:space-between;"><span>${m.name}</span><span>${m.price}元/月 ${subscriptionType==='physical'?`+ 打印费${m.printFee}元/月`:''}</span></div></div>`;
        });
        html += `<div class="form-group"><label>📅 选择起始月份（2026年7月-12月）</label><div class="month-picker" id="monthPicker"></div></div>`;
        html += `<div class="form-group"><label>⏱️ 订阅月数（1-6个月，结束不得晚于2026年12月）</label><input type="number" id="monthsCount" min="1" max="12" value="${subscriptionMonths}" step="1" style="border-radius:30px;"></div><div id="monthWarning" style="color:#c3641e; font-size:0.8rem; margin:6px 0;"></div>`;
        let monthlyTotal = selectedWorks.reduce((s,w)=>s+w.perMonthQuantity,0);
        let totalChapters = monthlyTotal * subscriptionMonths;
        html += `<div style="background:#f0f2f5; border-radius:24px; padding:12px; margin:10px 0; font-size:0.85rem;">📊 当前订阅方案预览：每月 ${monthlyTotal} 章，订阅 ${subscriptionMonths} 个月 → 总计 <strong>${totalChapters}</strong> 章</div>`;
        html += `<button id="nextToInfoBtn" class="btn-primary">下一步：填写信息 →</button><button id="backToWorksFromMem" class="btn-secondary">返回修改作品</button>`;
        return html;
    }

    function populateMonthPicker() {
        const container = document.getElementById('monthPicker');
        if(!container) return;
        container.innerHTML = '';
        availableMonths.forEach(m => {
            const div = document.createElement('div');
            div.className = `month-card ${selectedStartMonth === m.value ? 'selected' : ''}`;
            div.innerText = m.label;
            div.setAttribute('data-month', m.value);
            div.onclick = () => { selectedStartMonth = m.value; renderStep(); };
            container.appendChild(div);
        });
    }
    function updateMonthWarning() {
        const warnSpan = document.getElementById('monthWarning');
        if(warnSpan) warnSpan.innerText = (selectedStartMonth && !isEndDateValid()) ? '⚠️ 订阅结束时间超出了2026年12月31日，请减少月数或更换起始月' : '';
    }

    function renderInfoStep() {
        if(subscriptionType === 'physical') {
            let html = `<div class="modal-title animate-step">✍️ 你的专属信件地址</div><div class="form-group"><label>收货姓名</label><input type="text" id="fullName" placeholder="真实姓名" value="${userInfo.name}"></div>`;
            html += `<div class="form-group"><label>📬 接收方式</label><div class="delivery-group" id="deliveryGroup">`;
            html += `<div class="delivery-card ${deliveryMethod==='address'?'selected':''}" data-delivery="address"><div class="delivery-emoji">📮</div><div class="delivery-label">送至地址</div><div class="check-circle"></div></div>`;
            html += `<div class="delivery-card ${deliveryMethod==='pickup'?'selected':''}" data-delivery="pickup"><div class="delivery-emoji">🏢</div><div class="delivery-label">线下传递（自取点）</div><div class="check-circle"></div></div></div></div>`;
            html += `<div id="addressField" style="${deliveryMethod==='address'?'block':'none'}"><div class="form-group"><label>详细地址</label><input type="text" id="address" placeholder="省/市/区 街道门牌" value="${userInfo.address}"></div></div>`;
            html += `<div class="form-group"><label>电子邮箱（送达提醒）</label><input type="email" id="email" placeholder="your@email.com" value="${userInfo.email}"></div>`;
            html += `<button id="toPaymentBtn" class="btn-primary">确认信息，添加客服付款 →</button><button id="backToMembershipFromInfo" class="btn-secondary">返回修改会员</button>`;
            return html;
        } else {
            return `<div class="modal-title animate-step">✉️ 你的接收邮箱</div><div class="form-group"><label>电子邮箱（接收兑换码）</label><input type="email" id="digitalEmailInput" placeholder="your@email.com" value="${digitalEmail}"></div><button id="toPaymentBtn" class="btn-primary">确认信息，添加客服付款 →</button><button id="backToMembershipFromInfo" class="btn-secondary">返回修改会员</button>`;
        }
    }

    function renderPaymentStep() {
        const monthlyWorksFee = calcMonthlyWorksFee();
        const totalWorksFee = calcTotalWorksFee();
        const membershipTotal = calcMembershipTotal();
        const printTotal = calcPrintTotal();
        const grandTotal = calcGrandTotal();
        const monthlyTotalChapters = selectedWorks.reduce((s,w)=>s+w.perMonthQuantity,0);
        const totalChapters = monthlyTotalChapters * subscriptionMonths;
        const worksDetail = selectedWorks.map(w=>`${w.name} ${w.perMonthQuantity}章/月`).join('、');
        let remark = `【MOMOREAD${subscriptionType==='physical'?'实体':'线上'}订阅订单】\n作品清单（每月）：${worksDetail}\n订阅月数：${subscriptionMonths} 个月\n每月作品费用：${monthlyWorksFee.toFixed(2)}元\n总作品费用：${totalWorksFee.toFixed(2)}元（${monthlyWorksFee.toFixed(2)} × ${subscriptionMonths}）\n会员档位：${selectedMembership.name} （${selectedMembership.price}元/月）`;
        if(subscriptionType==='physical') remark += `\n打印费：${selectedMembership.printFee}元/月\n会员+打印总费用：${(membershipTotal+printTotal).toFixed(2)}元`;
        else remark += `\n会员总费用：${membershipTotal.toFixed(2)}元`;
        remark += `\n总金额：${grandTotal.toFixed(2)}元\n总章节数：${totalChapters} 章\n起始月份：${selectedStartMonth}`;
        if(subscriptionType==='physical') remark += `\n送达方式：${deliveryMethod==='address'?`送至地址：${userInfo.address}`:'线下传递（自取）'}\n联系人：${userInfo.name} / 邮箱：${userInfo.email}`;
        else remark += `\n接收邮箱：${digitalEmail}`;

        let html = `<div class="modal-title animate-step">💳 添加客服微信完成付款</div>`;
        html += `<div class="invoice"><strong>费用明细</strong><br>每月作品: ${monthlyWorksFee.toFixed(2)}元 × ${subscriptionMonths}月 = ${totalWorksFee.toFixed(2)}元<br>会员订阅: ${selectedMembership.price}元/月 × ${subscriptionMonths}月 = ${membershipTotal.toFixed(2)}元`;
        if(subscriptionType==='physical') html += `<br>打印费: ${selectedMembership.printFee}元/月 × ${subscriptionMonths}月 = ${printTotal.toFixed(2)}元`;
        html += `<br><strong>总计：${grandTotal.toFixed(2)}元</strong><br>总章节数：${totalChapters} 章</div>`;
        html += `<div class="wechat-card"><div style="font-weight:600;">客服微信</div><div class="wechat-id">Yu2025boy</div><div>请复制下方订单信息，添加好友时发送给客服</div></div>`;
        html += `<div class="order-summary" id="orderSummaryBox">${remark.replace(/\n/g,'<br>')}<br><button class="copy-btn-inside" id="copyRemarkInsideBtn">📋 复制订单备注</button></div>`;
        html += `<button id="closePaymentBtn" class="btn-primary">关闭</button>`;
        return html;
    }

    function renderWechatStep() {
        return `<div class="modal-title animate-step">📱 联系客服完成订阅</div><div class="wechat-card"><div style="font-size:1.2rem;">由于 ${selectedMembership?.name} 会员为特殊支持，请添加客服微信办理：</div><div class="wechat-id">Yu2025boy</div><div style="font-size:0.85rem;">添加时请备注“MOMOREAD ${selectedMembership?.name}订阅”</div><div style="margin-top:16px;">🔹 客服将协助完成后续流程</div></div><button id="closeWechatBtn" class="btn-primary">关闭窗口</button>`;
    }

    function attachGlobalEvents() {
        // 作品卡片逻辑
        document.querySelectorAll('.work-card').forEach(card => {
            const name = card.getAttribute('data-name');
            const price = parseFloat(card.getAttribute('data-price'));
            const minus = card.querySelector('.minus');
            const plus = card.querySelector('.plus');
            const qtySpan = card.querySelector('.qty-num');
            const update = () => {
                const existing = selectedWorks.find(w => w.name === name);
                const qty = existing ? existing.perMonthQuantity : 0;
                if(qtySpan) qtySpan.innerText = qty;
                if(qty>0) card.classList.add('selected'); else card.classList.remove('selected');
                const nextBtn = document.getElementById('nextToMembershipBtn');
                if(nextBtn) nextBtn.disabled = !isTotalMonthlyValid();
                const totalDiv = document.querySelector('.works-grid')?.parentElement?.querySelector('div[style*="text-align:right"]');
                if(totalDiv){
                    let total = selectedWorks.reduce((s,w)=>s+w.perMonthQuantity,0);
                    totalDiv.innerHTML = `每月总章节：${total} 章 | ${isEachWorkMultipleOfFour() && total>0 ? '✅ 有效' : '❌ 每个作品数量需为4的倍数且每月总数>0'}`;
                }
            };
            if(minus) minus.onclick = (e) => { e.stopPropagation(); const ex = selectedWorks.find(w=>w.name===name); if(ex && ex.perMonthQuantity>=4){ ex.perMonthQuantity-=4; if(ex.perMonthQuantity===0) selectedWorks = selectedWorks.filter(w=>w.name!==name); } update(); };
            if(plus) plus.onclick = (e) => { e.stopPropagation(); const ex = selectedWorks.find(w=>w.name===name); if(ex) ex.perMonthQuantity+=4; else selectedWorks.push({name,price,perMonthQuantity:4}); update(); };
            card.onclick = (e) => { if(e.target.classList && (e.target.classList.contains('qty-btn')||e.target.classList.contains('qty-num'))) return; const ex = selectedWorks.find(w=>w.name===name); if(ex) selectedWorks = selectedWorks.filter(w=>w.name!==name); else selectedWorks.push({name,price,perMonthQuantity:4}); update(); };
        });
        const nextMembership = document.getElementById('nextToMembershipBtn');
        if(nextMembership){ const clone = nextMembership.cloneNode(true); nextMembership.parentNode.replaceChild(clone, nextMembership); clone.onclick = () => { if(isTotalMonthlyValid()){ step='membership'; renderStep(); } else alert("每个作品每月数量必须是4的倍数且每月总章节数大于0"); }; }
        const cancelWorks = document.getElementById('cancelWorksBtn'); if(cancelWorks) cancelWorks.onclick = closeModal;
        document.querySelectorAll('.membership-option').forEach(opt => { opt.onclick = () => { const name=opt.getAttribute('data-mem'), price=parseFloat(opt.getAttribute('data-price')), printFee=parseInt(opt.getAttribute('data-print')), wechatOnly=opt.getAttribute('data-wechat')==='true'; selectedMembership={name,price,printFee,wechatOnly}; if(wechatOnly){ step='wechat'; renderStep(); } else renderStep(); }; });
        const nextInfo = document.getElementById('nextToInfoBtn');
        if(nextInfo){ const clone = nextInfo.cloneNode(true); nextInfo.parentNode.replaceChild(clone, nextInfo); clone.onclick = () => { if(!selectedMembership) alert("请选择会员制度"); else if(!selectedStartMonth) alert("请选择起始月份"); else if(!isEndDateValid()) alert("订阅结束时间不能超过2026年12月31日"); else { step='info'; renderStep(); } }; }
        const backToWorks = document.getElementById('backToWorksFromMem'); if(backToWorks) backToWorks.onclick = () => { step='works'; renderStep(); };
        if(step === 'info') {
            if(subscriptionType === 'physical') {
                document.querySelectorAll('.delivery-card').forEach(card => { card.onclick = () => { deliveryMethod = card.getAttribute('data-delivery'); renderStep(); }; });
                const toPay = document.getElementById('toPaymentBtn');
                if(toPay){ const clone = toPay.cloneNode(true); toPay.parentNode.replaceChild(clone, toPay); clone.onclick = () => { const name = document.getElementById('fullName')?.value, email = document.getElementById('email')?.value; if(!name || !email) alert("请填写姓名和邮箱"); else { userInfo.name=name; userInfo.email=email; if(deliveryMethod==='address'){ const addr=document.getElementById('address')?.value; if(!addr) alert("请填写详细地址"); else { userInfo.address=addr; step='payment'; renderStep(); } } else { userInfo.address="线下自取"; step='payment'; renderStep(); } } }; }
            } else {
                const toPay = document.getElementById('toPaymentBtn');
                if(toPay){ const clone = toPay.cloneNode(true); toPay.parentNode.replaceChild(clone, toPay); clone.onclick = () => { const email = document.getElementById('digitalEmailInput')?.value; if(!email) alert("请填写接收邮箱"); else { digitalEmail=email; step='payment'; renderStep(); } }; }
            }
            const backMem = document.getElementById('backToMembershipFromInfo'); if(backMem) backMem.onclick = () => { step='membership'; renderStep(); };
        }
        if(step === 'payment') {
            const copyBtn = document.getElementById('copyRemarkInsideBtn');
            if(copyBtn) {
                copyBtn.onclick = async () => {
                    const summaryDiv = document.getElementById('orderSummaryBox');
                    if(summaryDiv){
                        let rawText = summaryDiv.innerText.replace('📋 复制订单备注', '').trim();
                        try {
                            await navigator.clipboard.writeText(rawText);
                            alert('✅ 订单备注已复制，请粘贴发送给客服微信：Yu2025boy');
                        } catch(e) {
                            const textarea = document.createElement('textarea');
                            textarea.value = rawText;
                            document.body.appendChild(textarea);
                            textarea.select();
                            document.execCommand('copy');
                            document.body.removeChild(textarea);
                            alert('✅ 已复制（手动方式），请粘贴发送给客服');
                        }
                    }
                };
            }
            const closePay = document.getElementById('closePaymentBtn'); if(closePay) closePay.onclick = closeModal;
        }
        if(step === 'wechat') {
            const closeWe = document.getElementById('closeWechatBtn'); if(closeWe) closeWe.onclick = closeModal;
        }
    }

    function renderStep() {
        if(selectedMembership && selectedMembership.wechatOnly && step !== 'wechat' && step !== 'works' && step !== 'membership') step = 'wechat';
        let html = '';
        if(step === 'works') html = renderWorksStep();
        else if(step === 'membership') html = renderMembershipStep();
        else if(step === 'wechat') html = renderWechatStep();
        else if(step === 'info') html = renderInfoStep();
        else if(step === 'payment') html = renderPaymentStep();
        modalContent.innerHTML = html;
        if(step === 'membership') {
            populateMonthPicker();
            const monthsInput = document.getElementById('monthsCount');
            if(monthsInput) monthsInput.onchange = (e) => { let val=parseInt(e.target.value)||1; subscriptionMonths=Math.min(12,Math.max(1,val)); if(!isEndDateValid()) while(subscriptionMonths>1 && !isEndDateValid()) subscriptionMonths--; monthsInput.value=subscriptionMonths; updateMonthWarning(); renderStep(); };
            updateMonthWarning();
        }
        attachGlobalEvents();
    }

    document.getElementById('openPhysicalBtn').addEventListener('click', () => openModal('physical'));
    document.getElementById('openDigitalBtn').addEventListener('click', () => openModal('digital'));
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && modal.classList.contains('show')) closeModal(); });
})();
</script>
</body>
</html>
