<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Momocat 莫猫 (中国官网)</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
        }
        body {
            background-color: #fbfbfd;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex; align-items: flex-start; justify-content: center;
            overflow: hidden; color: #1d1d1f;
            --rubber-card-gap: clamp(16px, 2vw, 24px);
            --rubber-section-padding: clamp(16px, 3vw, 32px);
        }

        .site-header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: clamp(10px, 2vw, 12px) clamp(16px, 3vw, 24px);
            background-color: rgba(251, 251, 253, 0.65);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-bottom: 0.8px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02); z-index: 30;
            display: flex; align-items: center; justify-content: center;
        }
        .header-title {
            font-weight: 700; font-size: clamp(1.8rem, 5vw, 2.2rem);
            letter-spacing: -0.02em; color: #1d1d1f;
            padding: clamp(6px, 1.5vw, 8px) clamp(20px, 4vw, 28px);
            border-radius: 40px; min-height: 44px; display: flex; align-items: center;
            user-select: none;
        }

        .main-content {
            position: fixed; top: 72px; left: 0; width: 100%; height: calc(100vh - 72px);
            overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; overscroll-behavior-y: contain;
            padding-bottom: 0;
        }
        .main-content::-webkit-scrollbar { display: none; }

        .cover-card {
            width: 100%; background-color: #e0e0e5;
            padding: clamp(50px, 8vw, 80px) clamp(20px, 5vw, 40px);
            text-align: center; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #1d1d1f; min-height: clamp(320px, 40vw, 420px);
            border: 0 solid transparent;
            border-image: repeating-linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #a18cd1, #a18cd1, #fbc2eb, #8fd3f4, #8fd3f4, #ff9a9e) 1;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05) inset, 0 0 20px rgba(160, 200, 255, 0.3), 0 0 40px rgba(200, 160, 255, 0.2);
        }
        .cover-card::before {
            content: ""; position: absolute; top: -50%; left: -20%; width: 140%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15) 0%, transparent 60%);
            pointer-events: none; z-index: 1;
        }
        .cover-card::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg); animation: fullShine 5s ease-in-out infinite;
            pointer-events: none; z-index: 1; filter: blur(4px);
        }
        @keyframes fullShine {
            0% { left: -100%; opacity: 0; } 10% { opacity: 1; } 30% { left: 120%; opacity: 1; }
            40% { left: 120%; opacity: 0; } 100% { left: -100%; opacity: 0; }
        }
        .cover-top-left {
            position: absolute; top: clamp(20px, 3vw, 30px); left: clamp(20px, 3vw, 30px);
            font-size: clamp(0.8rem, 2vw, 1rem); font-weight: 500; color: #86868b; letter-spacing: 1px; z-index: 4;
        }
        .cover-center { position: relative; z-index: 4; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .cover-title {
            font-size: clamp(3rem, 12vw, 6rem); font-weight: 700; letter-spacing: -0.03em;
            color: #1d1d1f; margin-bottom: clamp(24px, 4vw, 36px); line-height: 1.1;
        }
        .cover-link {
            color: #0071e3; font-weight: 500; font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            text-decoration: underline; text-underline-offset: 4px; cursor: pointer; transition: opacity 0.2s;
        }
        .cover-link:hover { opacity: 0.7; }

        .content-inner {
            padding: var(--rubber-section-padding) var(--rubber-section-padding) 0;
            display: grid; grid-template-columns: 1fr; gap: var(--rubber-card-gap); align-items: start;
        }
        @media (min-width: 1024px) {
            .content-inner { grid-template-columns: 1fr 1fr; max-width: 1400px; margin: 0 auto; }
            .poster-card, .new-rule-card, .store-card, .redeem-card { max-width: 100%; width: 100%; }
        }

        .poster-card, .new-rule-card, .store-card, .redeem-card {
            width: 100%; max-width: 640px; margin: 0 auto; aspect-ratio: 16 / 9;
            background: #ffffff; border-radius: clamp(20px, 3vw, 28px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.02), 0 8px 24px rgba(0,0,0,0.04);
            position: relative; overflow: hidden; transition: all 0.3s ease;
            border: 0.5px solid rgba(0,0,0,0.04); cursor: pointer;
        }
        .poster-card { background: #0D5C3A; }
        .poster-card:hover, .new-rule-card:hover, .store-card:hover, .redeem-card:hover {
            transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.08);
        }

        .poster-center, .new-rule-center, .store-center, .redeem-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 2; pointer-events: none;
        }
        .poster-novel-title {
            font-size: clamp(2.8rem, 8.5vw, 3.8rem); font-weight: 700; letter-spacing: -0.02em;
            color: #ffffff; line-height: 1.2; margin-bottom: 8px;
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink { 0%, 100% { color: #ffffff; } 50% { color: #0D5C3A; } }
        .poster-subtitle { font-size: 1.2rem; font-weight: 500; color: rgba(255,255,255,0.8); letter-spacing: 1px; }
        .new-rule-title {
            font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 700; letter-spacing: -0.02em;
            color: #1d1d1f; line-height: 1.2; margin-bottom: 8px;
        }
        .redeem-center .new-rule-title { font-size: clamp(1.6rem, 4vw, 2.4rem); max-width: 90%; }

        .train-track {
            position: absolute; bottom: 56px; left: 10%; width: 80%; height: 1.5px;
            background: rgba(255,255,255,0.25); z-index: 1; border-radius: 2px;
        }
        .train {
            position: absolute; top: -7px; left: -90px; width: 90px; height: 16px;
            background: rgba(255,255,255,0.9); border-radius: 8px;
            animation: trainMove 3.5s linear infinite;
            box-shadow: 0 0 18px rgba(255,255,255,0.5), 0 0 4px rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: space-evenly; padding: 0 6px; gap: 3px;
        }
        .train::before, .train::after { content: ''; width: 6px; height: 6px; background: rgba(13, 92, 58, 0.6); border-radius: 50%; flex-shrink: 0; }
        .train-window { width: 6px; height: 6px; background: rgba(13, 92, 58, 0.6); border-radius: 50%; flex-shrink: 0; }
        @keyframes trainMove {
            0% { left: -90px; opacity: 0; } 5% { opacity: 1; } 95% { opacity: 1; } 100% { left: calc(100% + 90px); opacity: 0; }
        }

        .store-bg-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; align-content: center;
            padding: 10px; user-select: none; color: #d0ccc5; font-weight: 700; font-size: 1.2rem;
            letter-spacing: 2px; line-height: 1.8;
        }
        .store-bg-text span { display: inline-block; transition: all 0.25s cubic-bezier(0.2, 0.8, 0.3, 1.2); }
        .store-card:hover .store-bg-text span:hover {
            transform: scale(2.5); color: #C4A882; font-weight: 800; z-index: 2;
            text-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        /* 极光容器 */
        .aurora-wrapper {
            width: 100%;
            height: 280px;
            position: relative;
            overflow: hidden;
            margin-top: var(--rubber-card-gap);
        }
        .aurora-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 弹窗等其余样式保持不变 */
        .modal-overlay { ... }
        /* 由于样式过多，此处不再重复展示所有弹窗样式，完整版见之前回复 */
    </style>
</head>
<body>
    <header class="site-header"><div class="header-title">Moc</div></header>

    <div class="main-content" id="mainContent">
        <div class="cover-card" id="coverCard">
            <div class="cover-top-left">新Headline</div>
            <div class="cover-center">
                <h1 class="cover-title">线上活动</h1>
                <a href="#" class="cover-link" id="trailerBtn">看个究竟</a>
            </div>
        </div>

        <div class="content-inner">
            <div class="poster-card" id="posterCard">
                <div class="poster-center">
                    <div class="poster-novel-title">三号线</div>
                    <div class="poster-subtitle">2016-2026</div>
                </div>
                <div class="train-track"><div class="train"><span class="train-window"></span><span class="train-window"></span><span class="train-window"></span><span class="train-window"></span><span class="train-window"></span></div></div>
            </div>
            <div class="new-rule-card" id="newRuleCard">
                <div class="new-rule-center"><div class="new-rule-title">2026 MOMOREAD<br>新制度</div></div>
            </div>
            <div class="store-card" id="storeCard">
                <div class="store-bg-text" id="storeBgText"></div>
                <div class="store-center"><div class="new-rule-title" style="text-shadow: 0 2px 10px rgba(255,255,255,0.8);">在线商店</div></div>
            </div>
            <div class="redeem-card" id="redeemCard">
                <div class="redeem-center"><div class="new-rule-title">使用兑换码兑换<br>在Moc Store里面购买的兑换码</div></div>
            </div>
        </div>

        <!-- 底部极光动效 -->
        <div class="aurora-wrapper" id="auroraContainer"></div>
    </div>

    <!-- 弹窗等代码保持不变，为简洁起见此处省略，请使用之前提供的完整弹窗逻辑 -->

    <script src="https://cdn.jsdelivr.net/npm/ogl@0.0.75/dist/ogl.min.js"></script>
    <script>
        (function() {
            // 原有逻辑：SmoothScrollEngine, RubberEngine, 卡片交互, 弹窗等
            // ...（由于篇幅限制，此处未重复，但实际整合时应包含全部交互代码）

            // ---------- 极光动效初始化 ----------
            const auroraContainer = document.getElementById('auroraContainer');
            if (auroraContainer && typeof OGL !== 'undefined') {
                const { Renderer, Program, Mesh, Color, Triangle } = OGL;

                const VERT = `#version 300 es
in vec2 position;
void main() {
  gl_Position = vec4(position, 0.0, 1.0);
}`;

                const FRAG = `#version 300 es
precision highp float;

uniform float uTime;
uniform float uAmplitude;
uniform vec3 uColorStops[3];
uniform vec2 uResolution;
uniform float uBlend;

out vec4 fragColor;

vec3 permute(vec3 x) {
  return mod(((x * 34.0) + 1.0) * x, 289.0);
}

float snoise(vec2 v){
  const vec4 C = vec4(
      0.211324865405187, 0.366025403784439,
      -0.577350269189626, 0.024390243902439
  );
  vec2 i  = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod(i, 289.0);

  vec3 p = permute(
      permute(i.y + vec3(0.0, i1.y, 1.0))
    + i.x + vec3(0.0, i1.x, 1.0)
  );

  vec3 m = max(
      0.5 - vec3(
          dot(x0, x0),
          dot(x12.xy, x12.xy),
          dot(x12.zw, x12.zw)
      ), 
      0.0
  );
  m = m * m;
  m = m * m;

  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);

  vec3 g;
  g.x  = a0.x  * x0.x  + h.x  * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

struct ColorStop {
  vec3 color;
  float position;
};

#define COLOR_RAMP(colors, factor, finalColor) {              \
  int index = 0;                                            \
  for (int i = 0; i < 2; i++) {                               \
     ColorStop currentColor = colors[i];                    \
     bool isInBetween = currentColor.position <= factor;    \
     index = int(mix(float(index), float(i), float(isInBetween))); \
  }                                                         \
  ColorStop currentColor = colors[index];                   \
  ColorStop nextColor = colors[index + 1];                  \
  float range = nextColor.position - currentColor.position; \
  float lerpFactor = (factor - currentColor.position) / range; \
  finalColor = mix(currentColor.color, nextColor.color, lerpFactor); \
}

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  
  ColorStop colors[3];
  colors[0] = ColorStop(uColorStops[0], 0.0);
  colors[1] = ColorStop(uColorStops[1], 0.5);
  colors[2] = ColorStop(uColorStops[2], 1.0);
  
  vec3 rampColor;
  COLOR_RAMP(colors, uv.x, rampColor);
  
  float height = snoise(vec2(uv.x * 2.0 + uTime * 0.1, uTime * 0.25)) * 0.5 * uAmplitude;
  height = exp(height);
  height = (uv.y * 2.0 - height + 0.2);
  float intensity = 0.6 * height;
  
  float midPoint = 0.20;
  float auroraAlpha = smoothstep(midPoint - uBlend * 0.5, midPoint + uBlend * 0.5, intensity);
  
  vec3 auroraColor = intensity * rampColor;
  
  fragColor = vec4(auroraColor * auroraAlpha, auroraAlpha);
}`;

                const renderer = new Renderer({
                    alpha: true,
                    premultipliedAlpha: true,
                    antialias: true,
                    webgl: 2
                });
                const gl = renderer.gl;
                gl.clearColor(0, 0, 0, 0);
                gl.enable(gl.BLEND);
                gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

                const geometry = new Triangle(gl);
                if (geometry.attributes.uv) {
                    delete geometry.attributes.uv;
                }

                const colorStops = ["#7cff67", "#B497CF", "#5227FF"];
                const colorStopsArray = colorStops.map(hex => new Color(hex).slice(0, 3));

                const program = new Program(gl, {
                    vertex: VERT,
                    fragment: FRAG,
                    uniforms: {
                        uTime: { value: 0 },
                        uAmplitude: { value: 1.0 },
                        uColorStops: { value: colorStopsArray },
                        uResolution: { value: [auroraContainer.offsetWidth, auroraContainer.offsetHeight] },
                        uBlend: { value: 0.5 }
                    }
                });

                const mesh = new Mesh(gl, { geometry, program });
                auroraContainer.appendChild(gl.canvas);
                gl.canvas.style.width = '100%';
                gl.canvas.style.height = '100%';

                const resize = () => {
                    renderer.setSize(auroraContainer.offsetWidth, auroraContainer.offsetHeight);
                    program.uniforms.uResolution.value = [auroraContainer.offsetWidth, auroraContainer.offsetHeight];
                };
                window.addEventListener('resize', resize);

                let animateId;
                const update = (t) => {
                    animateId = requestAnimationFrame(update);
                    program.uniforms.uTime.value = t * 0.001 * 1.0; // speed 1.0
                    program.uniforms.uAmplitude.value = 1.0;
                    program.uniforms.uBlend.value = 0.5;
                    renderer.render({ scene: mesh });
                };
                animateId = requestAnimationFrame(update);
                resize();

                // 清理（非必须，但保留以防页面卸载）
                window.addEventListener('beforeunload', () => {
                    cancelAnimationFrame(animateId);
                    window.removeEventListener('resize', resize);
                });
            }
        })();
    </script>
</body>
</html>
