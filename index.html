        body {

            align-items: flex-start;
            justify-content: center;
            overflow: hidden;
            color: #1d1d1f;

            --rubber-section-padding: clamp(16px, 3vw, 32px);
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            background-color: rgba(251, 251, 253, 0.65);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);

            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-title {
            font-weight: 700;
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            letter-spacing: -0.02em;
            color: #1d1d1f;
            cursor: pointer;
            padding: clamp(6px, 1.5vw, 8px) clamp(20px, 4vw, 28px);
            border-radius: 40px;
            transition: background-color 0.2s, color 0.2s, transform 0.1s;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        .header-title:hover {
            background-color: rgba(0,0,0,0.03);
            color: #b76e4b;
            transform: scale(1.02);
        }

        .dropdown-menu {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            max-height: calc(100vh - 72px);
            overflow-y: auto;
            background-color: #ffffff;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
            z-index: 29;
            padding: clamp(28px, 5vw, 40px) clamp(16px, 3vw, 24px);
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            pointer-events: none;
            box-shadow: 0 12px 32px -12px rgba(0,0,0,0.08);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .dropdown-menu.show { transform: translateY(0); pointer-events: auto; }
        .menu-scroll {
            overflow-x: auto; overflow-y: visible; scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
            overscroll-behavior-x: contain; padding-bottom: 4px;
        }
        .menu-scroll::-webkit-scrollbar { display: none; }
        .menu-grid {
            display: grid; gap: clamp(20px, 3vw, 32px); margin: 0 auto;
            grid-template-columns: repeat(4, 1fr); min-width: max-content;
        }
        .rubber-tablet .menu-grid { grid-template-columns: repeat(2, 1fr); }
        .rubber-phone .menu-grid { grid-template-columns: repeat(1, 1fr); gap: 24px; min-width: 100%; }
        .rubber-desktop .menu-grid, .rubber-wide .menu-grid { max-width: 1400px; margin: 0 auto; }
        .menu-section { text-align: left; min-width: 160px; }
        .menu-section h3 {
            font-size: clamp(1.3rem, 3.5vw, 1.6rem); font-weight: 700; color: #1d1d1f;
            margin-bottom: 16px; letter-spacing: -0.01em; border-bottom: 1px solid rgba(0,0,0,0.08);
            padding-bottom: 10px;

        .menu-section ul { list-style: none; }
        .menu-section li { margin: 10px 0; }
        .menu-section a {

        @media (max-width: 600px) {

        .main-content {
            position: fixed; top: 72px; left: 0; width: 100%; height: calc(100vh - 72px);

        /* 发布会预告动画容器 */
        .cinema {

        .card-image {

    </style>
</head>

    <script>
        (function() {
            "use strict";

            const SmoothScrollEngine = {
                init: function() {
                    const menuScroll = document.getElementById('menuScroll');
                    if (menuScroll) this._applyInertiaToElement(menuScroll, 'horizontal');
                },
                _applyInertiaToElement: function(el, direction) {
                    if (!el) return;
                    let startX, scrollLeft;
                    el.addEventListener('wheel', (e) => {
                        if (direction === 'horizontal') {
                            e.preventDefault();
                            el.scrollLeft += (e.deltaY || e.deltaX) * 0.5;
                        }
                    }, { passive: false });
                    el.addEventListener('touchstart', (e) => { startX = e.touches[0].pageX; scrollLeft = el.scrollLeft; }, { passive: true });
                    el.addEventListener('touchmove', (e) => {
                        if (!startX) return;
                        const x = e.touches[0].pageX; const walk = (startX - x) * 1.5;
                        el.scrollLeft = scrollLeft + walk;
                    }, { passive: true });
                }
            };

            const RubberEngine = {
                breakpoints: { phone: 600, tablet: 1024, desktop: 1440 },
                currentDevice: 'desktop',
                init: function() { this._detectAndApply(); this._bindEvents(); },
                _detectAndApply: function() {
                    const width = window.innerWidth; const body = document.body;
                    body.classList.remove('rubber-phone', 'rubber-tablet', 'rubber-desktop', 'rubber-wide');
                    let device;
                    if (width < this.breakpoints.phone) { body.classList.add('rubber-phone'); device = 'phone'; }
                    else if (width < this.breakpoints.tablet) { body.classList.add('rubber-tablet'); device = 'tablet'; }
                    else if (width < this.breakpoints.desktop) { body.classList.add('rubber-desktop'); device = 'desktop'; }
                    else { body.classList.add('rubber-wide'); device = 'wide'; }
                    this.currentDevice = device;
                    body.setAttribute('data-rubber-device', device);
                    this._adjustGridColumns();
                },
                _adjustGridColumns: function() {
                    const grid = document.getElementById('dynamicCardGrid');
                    if (!grid) return;
                    let columns = 2;
                    switch (this.currentDevice) {
                        case 'phone': columns = 1; break;
                        case 'tablet': columns = 2; break;
                        case 'desktop': columns = 3; break;
                        case 'wide': columns = 4; break;
                    }
                    grid.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
                },
                _bindEvents: function() {
                    let resizeTimer;
                    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => this._detectAndApply(), 100); });
                    window.addEventListener('orientationchange', () => { setTimeout(() => this._detectAndApply(), 50); });
                }
            };

            // ======================= 时间轴关键帧 =======================
            const timeline = [
                { start: 0, end: 5, type: "envelope", caption: "莫川读书会……要变了。" },
                { start: 5, end: 15, type: "calendar", caption: "从今年7月1日起，一个全新的订阅时代即将开启。" },
                { start: 15, end: 25, type: "cards", caption: "不是涨价，而是透明。不是折腾，而是选择。" },
                { start: 25, end: 35, type: "keywords", caption: "你会是哪一档？你的权益会发生什么变化？" },
                { start: 35, end: 45, type: "book", caption: "6月1日，莫川读书会 · 全新订阅制度正式发布。不见不散。" },
                { start: 45, end: 50, type: "reminder", caption: "" }
            ];

            let animationId = null;
            let isPlaying = false;
            let currentTime = 0;
            let activeInterval = null;
            let keywordInterval = null;
            let currentSceneType = "";

            const dynamicSceneDiv = document.getElementById("dynamicScene");
            const captionDiv = document.getElementById("captionText");
            const timeDisplaySpan = document.getElementById("timeDisplay");
            const progressFill = document.getElementById("progressFill");
            const playBtn = document.getElementById("playBtn");
            const resetBtn = document.getElementById("resetBtn");
            const progressContainer = document.getElementById("progressBar");

            function clearAllIntervals() {
                if (activeInterval) { clearInterval(activeInterval); activeInterval = null; }
                if (keywordInterval) { clearInterval(keywordInterval); keywordInterval = null; }
            }

            function killSceneAnimations() {
                clearAllIntervals();
            }

            function renderSceneByType(type, currentSec) {
                dynamicSceneDiv.innerHTML = "";
                dynamicSceneDiv.style.justifyContent = "center";
                dynamicSceneDiv.style.alignItems = "center";
                dynamicSceneDiv.style.flexDirection = "column";

                const sceneContainer = document.getElementById("sceneContainer");
                if (type === "reminder") {
                    sceneContainer.style.background = "#000000";
                } else {
                    sceneContainer.style.background = "radial-gradient(circle at center, #0a0c18 0%, #000000 100%)";
                }

                switch (type) {
                    case "envelope":
                        const envelopeWrap = document.createElement("div");
                        envelopeWrap.className = "envelope";
                        envelopeWrap.innerHTML = "✉️✉️";
                        envelopeWrap.style.fontSize = "5.5rem";
                        envelopeWrap.style.animation = "floatIn 0.6s ease-out";
                        const textHint = document.createElement("div");
                        textHint.innerText = "新规则 · 即将揭晓";
                        textHint.style.marginTop = "20px";
                        textHint.style.fontSize = "1.2rem";
                        textHint.style.opacity = "0.8";
                        dynamicSceneDiv.appendChild(envelopeWrap);
                        dynamicSceneDiv.appendChild(textHint);
                        break;
                    case "calendar":
                        const calendarContainer = document.createElement("div");
                        calendarContainer.className = "calendar-box";
                        const dateDisplay = document.createElement("div");
                        dateDisplay.className = "calendar-date";
                        dateDisplay.id = "flickerDate";
                        dateDisplay.innerText = "2026.01.01";
                        calendarContainer.appendChild(dateDisplay);
                        const subHint = document.createElement("div");
                        subHint.innerText = "📅 新章程倒计时";
                        subHint.style.marginTop = "12px";
                        subHint.style.fontSize = "1rem";
                        subHint.style.color = "#333";
                        calendarContainer.appendChild(subHint);
                        dynamicSceneDiv.appendChild(calendarContainer);
                        
                        if (activeInterval) clearInterval(activeInterval);
                        let step = 0;
                        const maxSteps = 18;
                        const intervalTime = 120;
                        activeInterval = setInterval(() => {
                            if (!isPlaying || currentSceneType !== "calendar") {
                                if (currentSceneType !== "calendar") {
                                    clearInterval(activeInterval);
                                    activeInterval = null;
                                    return;
                                }
                            }
                            if (step < maxSteps) {
                                let randMonth = Math.floor(Math.random() * 6);
                                let randDay = Math.floor(Math.random() * 28) + 1;
                                let showDate = `2026.${(randMonth+1).toString().padStart(2,'0')}.${randDay.toString().padStart(2,'0')}`;
                                const dateElem = document.getElementById("flickerDate");
                                if (dateElem) dateElem.innerText = showDate;
                                step++;
                            } else {
                                const finalElem = document.getElementById("flickerDate");
                                if (finalElem) finalElem.innerText = "2026.07.01";
                                clearInterval(activeInterval);
                                activeInterval = null;
                            }
                        }, intervalTime);
                        break;
                    case "cards":
                        const cardsContainer = document.createElement("div");
                        cardsContainer.className = "cards-row";
                        const cardNames = ["一般读者", "26se (VIP)", "mailse"];
                        cardNames.forEach(name => {
                            const card = document.createElement("div");
                            card.className = "card-item";
                            card.innerText = name;
                            cardsContainer.appendChild(card);
                        });
                        dynamicSceneDiv.appendChild(cardsContainer);
                        const subCard = document.createElement("div");
                        subCard.innerText = "三档权益 · 各取所需";
                        subCard.style.marginTop = "25px";
                        subCard.style.fontSize = "0.9rem";
                        subCard.style.opacity = "0.7";
                        dynamicSceneDiv.appendChild(subCard);
                        break;
                    case "keywords":
                        const kwContainer = document.createElement("div");
                        kwContainer.className = "keyword-strip";
                        const keywordsList = ["纸质", "邮费", "粮包", "投票", "新作", "折扣", "专属补偿"];
                        const innerSpan = document.createElement("div");
                        innerSpan.style.display = "flex";
                        innerSpan.style.gap = "1rem";
                        innerSpan.style.flexWrap = "wrap";
                        innerSpan.style.justifyContent = "center";
                        kwContainer.appendChild(innerSpan);
                        dynamicSceneDiv.appendChild(kwContainer);
                        
                        let kwIndex = 0;
                        const updateKeywords = () => {
                            if (!isPlaying || currentSceneType !== "keywords") {
                                if (keywordInterval) clearInterval(keywordInterval);
                                return;
                            }
                            const showList = keywordsList.slice(kwIndex, kwIndex+3);
                            if (showList.length < 3) showList.push(...keywordsList.slice(0, 3-showList.length));
                            innerSpan.innerHTML = "";
                            showList.forEach(word => {
                                const tag = document.createElement("span");
                                tag.className = "keyword";
                                tag.innerText = word;
                                tag.style.animation = "wordFlash 0.4s ease-out";
                                innerSpan.appendChild(tag);
                            });
                            kwIndex = (kwIndex + 1) % keywordsList.length;
                        };
                        updateKeywords();
                        if (keywordInterval) clearInterval(keywordInterval);
                        keywordInterval = setInterval(updateKeywords, 800);
                        break;
                    case "book":
                        const bookDiv = document.createElement("div");
                        bookDiv.className = "book-cover";
                        const bookText = document.createElement("span");
                        bookText.innerText = "📖 6月1日 正式发布 📖";
                        bookDiv.appendChild(bookText);
                        dynamicSceneDiv.appendChild(bookDiv);
                        const bookFooter = document.createElement("div");
                        bookFooter.innerText = "莫川读书会 · 全新订阅制度";
                        bookFooter.style.marginTop = "20px";
                        bookFooter.style.fontSize = "1rem";
                        bookFooter.style.opacity = "0.7";
                        dynamicSceneDiv.appendChild(bookFooter);
                        break;
                    case "reminder":
                        const reminderDiv = document.createElement("div");
                        reminderDiv.className = "reminder-box";
                        const remindMsg = document.createElement("div");
                        remindMsg.className = "reminder-text";
                        remindMsg.innerText = "预约提醒？关注莫川，即可第一时间收到。";
                        reminderDiv.appendChild(remindMsg);
                        dynamicSceneDiv.appendChild(reminderDiv);
                        break;
                    default: break;
                }
            }

            function updateUIByTime(seconds) {
                let t = Math.min(50, Math.max(0, seconds));
                currentTime = t;
                
                timeDisplaySpan.innerText = `${t.toFixed(1)}s / 50.0s`;
                const progressPercent = (t / 50) * 100;
                progressFill.style.width = `${progressPercent}%`;
                
                let activeSegment = null;
                for (let seg of timeline) {
                    if (t >= seg.start && t < seg.end) {
                        activeSegment = seg;
                        break;
                    }
                }
                if (t >= 49.99 && t <= 50) {
                    activeSegment = timeline[timeline.length-1];
                }
                if (activeSegment) {
                    if (activeSegment.caption && activeSegment.caption !== "") {
                        captionDiv.innerText = activeSegment.caption;
                        captionDiv.style.opacity = "1";
                    } else {
                        captionDiv.innerText = "✨ 敬请期待 ✨";
                        captionDiv.style.opacity = "0.7";
                    }
                    if (currentSceneType !== activeSegment.type) {
                        killSceneAnimations();
                        currentSceneType = activeSegment.type;
                        renderSceneByType(currentSceneType, t);
                    }
                } else {
                    captionDiv.innerText = "感谢等待，不见不散。";
                    if (currentSceneType !== "reminder") {
                        killSceneAnimations();
                        currentSceneType = "reminder";
                        renderSceneByType("reminder", t);
                    }
                }
            }

            function play() {
                if (isPlaying) return;
                if (currentTime >= 49.99) {
                    reset();
                }
                isPlaying = true;
                playBtn.innerText = "⏸ 暂停";
                if (animationId) cancelAnimationFrame(animationId);
                let startBase = performance.now() - currentTime * 1000;
                function frame(now) {
                    if (!isPlaying) {
                        animationId = null;
                        return;
                    }
                    let elapsed = (now - startBase) / 1000;
                    let newTime = Math.min(50, Math.max(0, elapsed));
                    if (newTime >= 50) {
                        newTime = 50;
                        updateUIByTime(newTime);
                        isPlaying = false;
                        playBtn.innerText = "▶ 播放";
                        if (animationId) cancelAnimationFrame(animationId);
                        animationId = null;
                        return;
                    }
                    updateUIByTime(newTime);
                    animationId = requestAnimationFrame(frame);
                }
                if (animationId) cancelAnimationFrame(animationId);
                animationId = requestAnimationFrame(frame);
            }

            function pause() {
                if (!isPlaying) return;
                isPlaying = false;
                playBtn.innerText = "▶ 播放";
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            }

            function reset() {
                pause();
                killSceneAnimations();
                currentTime = 0;
                currentSceneType = "";
                updateUIByTime(0);
                const firstSeg = timeline[0];
                currentSceneType = firstSeg.type;
                renderSceneByType(currentSceneType, 0);
                captionDiv.innerText = firstSeg.caption;
                progressFill.style.width = "0%";
                timeDisplaySpan.innerText = "0.0s / 50.0s";
                playBtn.innerText = "▶ 播放";
                isPlaying = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            }

            function seekTo(percent) {
                if (isPlaying) pause();
                let newTime = (percent / 100) * 50;
                newTime = Math.min(49.99, Math.max(0, newTime));
                currentTime = newTime;
                killSceneAnimations();
                let active = null;
                for (let seg of timeline) {
                    if (newTime >= seg.start && newTime < seg.end) active = seg;
                }
                if (!active && newTime >= 49.9) active = timeline[timeline.length-1];
                if (active) {
                    currentSceneType = active.type;
                    renderSceneByType(currentSceneType, newTime);
                    captionDiv.innerText = active.caption || "✨ 敬请期待 ✨";
                } else {
                    currentSceneType = "reminder";
                    renderSceneByType("reminder", newTime);
                    captionDiv.innerText = "";
                }
                updateUIByTime(newTime);
            }

            progressContainer.addEventListener("click", (e) => {
                const rect = progressContainer.getBoundingClientRect();
                let clickX = e.clientX - rect.left;
                let percent = (clickX / rect.width) * 100;
                percent = Math.min(100, Math.max(0, percent));
                seekTo(percent);
            });

            playBtn.addEventListener("click", () => {
                if (isPlaying) pause();
                else play();
            });
            resetBtn.addEventListener("click", reset);

            function init() {
                SmoothScrollEngine.init();
                RubberEngine.init();
                reset();

                const mocTitle = document.getElementById('mocTitle');
                const dropdownMenu = document.getElementById('dropdownMenu');
                mocTitle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (dropdownMenu.classList.contains('show')) {
                        if (window.location.pathname.replace(/\/$/, '') !== '' && window.location.pathname.replace(/\/$/, '') !== '/index') {
                            window.location.href = '/';
                        } else {
                            dropdownMenu.classList.remove('show');
                        }
                    } else {
                        dropdownMenu.classList.add('show');
                    }
                });
                dropdownMenu.addEventListener('click', e => e.stopPropagation());
                document.addEventListener('click', () => { if (dropdownMenu.classList.contains('show')) dropdownMenu.classList.remove('show'); });
            }

            window.addEventListener('load', init);
            window.RubberEngine = RubberEngine;
            window.SmoothScrollEngine = SmoothScrollEngine;
        })();
    </script>
</body>
</html>
