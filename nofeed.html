<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Nofeed简索</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fbfbfd;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: hidden;
            color: #1d1d1f;
            --rubber-card-gap: clamp(16px, 2vw, 24px);
            --rubber-section-padding: clamp(16px, 3vw, 32px);
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: clamp(10px, 2vw, 12px) clamp(16px, 3vw, 24px);
            background-color: rgba(251, 251, 253, 0.65);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-bottom: 0.8px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-weight: 700;
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            letter-spacing: -0.02em;
            color: #1d1d1f;
            cursor: pointer;
            padding: clamp(6px, 1.5vw, 8px) clamp(20px, 4vw, 28px);
            border-radius: 40px;
            transition: background-color 0.2s, color 0.2s, transform 0.1s;
            min-height: 44px;
            display: flex;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .header-title:hover {
            background-color: rgba(0,0,0,0.03);
            color: #b76e4b;
            transform: scale(1.02);
        }

        .dropdown-menu {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            max-height: calc(100vh - 72px);
            overflow-y: auto;
            background-color: #ffffff;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
            z-index: 29;
            padding: clamp(28px, 5vw, 40px) clamp(16px, 3vw, 24px);
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            pointer-events: none;
            box-shadow: 0 12px 32px -12px rgba(0,0,0,0.08);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .dropdown-menu.show {
            transform: translateY(0);
            pointer-events: auto;
        }

        .menu-scroll {
            overflow-x: auto;
            overflow-y: visible;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            overscroll-behavior-x: contain;
            padding-bottom: 4px;
        }
        .menu-scroll::-webkit-scrollbar { display: none; }

        .menu-grid {
            display: grid;
            gap: clamp(20px, 3vw, 32px);
            margin: 0 auto;
            grid-template-columns: repeat(4, 1fr);
            min-width: max-content;
        }
        .rubber-tablet .menu-grid { grid-template-columns: repeat(2, 1fr); }
        .rubber-phone .menu-grid { grid-template-columns: repeat(1, 1fr); gap: 24px; min-width: 100%; }
        .rubber-desktop .menu-grid, .rubber-wide .menu-grid { max-width: 1400px; margin: 0 auto; }

        .menu-section { text-align: left; min-width: 160px; }
        .menu-section h3 {
            font-size: clamp(1.3rem, 3.5vw, 1.6rem);
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 16px;
            letter-spacing: -0.01em;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding-bottom: 10px;
        }
        .menu-section ul { list-style: none; }
        .menu-section li { margin: 10px 0; }
        .menu-section a {
            text-decoration: none;
            color: #3a3a3c;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            font-weight: 440;
            transition: color 0.2s, transform 0.15s;
            display: inline-block;
            padding: 4px 0;
            white-space: nowrap;
        }
        .menu-section a:hover { color: #b76e4b; transform: translateX(4px); }

        @media (max-width: 600px) {
            .dropdown-menu { top: 60px; max-height: calc(100vh - 60px); padding: 24px 16px; }
            .main-content { top: 60px; height: calc(100vh - 60px); }
        }

        .main-content {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            height: calc(100vh - 72px);
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            overscroll-behavior-y: contain;
            padding-bottom: calc(var(--rubber-section-padding) * 2);
        }
        .main-content::-webkit-scrollbar { display: none; }

        .tool-hero {
            background: #ffffff;
            border-bottom: 0.5px solid rgba(0,0,0,0.06);
            padding: clamp(32px, 5vw, 48px) var(--rubber-section-padding);
            text-align: center;
            margin-bottom: var(--rubber-section-padding);
        }
        .tool-hero-title {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1d1d1f;
            margin-bottom: clamp(8px, 1.5vw, 12px);
        }
        .tool-hero-desc {
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            color: #86868b;
            font-weight: 450;
            letter-spacing: 0.01em;
        }

        .content-inner {
            padding: 0 var(--rubber-section-padding);
        }

        .search-card {
            background: white;
            border-radius: clamp(20px, 3vw, 28px);
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.02), 0 8px 24px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            padding: clamp(20px, 4vw, 32px);
            margin-bottom: var(--rubber-card-gap);
            border: 0.5px solid rgba(0,0,0,0.04);
        }
        .search-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.06);
        }

        [contenteditable] {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            font-size: 1.5rem;
            line-height: 1.4;
            outline: none;
            border: none;
            text-align: center;
            color: #1d1d1f;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 4rem;
        }
        [contenteditable]:empty:before {
            content: "点击输入 搜索媒体 和 关键词";
            color: #8e8e93;
            font-size: 1rem;
            font-weight: 400;
        }

        .hint {
            text-align: center;
            font-size: 0.8rem;
            color: #86868b;
            margin-top: 12px;
            letter-spacing: 0.02em;
        }

        .info-note {
            text-align: center;
            font-size: 0.8rem;
            color: #8e8e93;
            margin-top: 2rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-title" id="mocTitle" role="button" aria-label="打开导航菜单" tabindex="0">Moc</div>
    </header>

    <!-- 下拉菜单（与主站一致） -->
    <div class="dropdown-menu" id="dropdownMenu" role="navigation" aria-label="站点导航">
        <div class="menu-scroll" id="menuScroll">
            <div class="menu-grid" id="menuGrid">
                <div class="menu-section">
                    <h3>主页</h3>
                    <ul>
                        <li><a href="newsroom">新闻室</a></li>
                    </ul>
                </div>
                <div class="menu-section">
                    <h3>商店</h3>
                    <ul>
                        <li><a href="store">购买项目</a></li>
                    </ul>
                </div>
                <div class="menu-section">
                    <h3>文学</h3>
                    <ul>
                        <li><a href="momoread">Momoread</a></li>
                    </ul>
                </div>
                <div class="menu-section">
                    <h3>程序</h3>
                    <ul>
                        <li><a href="tyubox">Tyubox待办盒子</a></li>
                        <li><a href="nofeed">Nofeed简索</a></li>
                    </ul>
                </div>
                <div class="menu-section">
                    <h3>活动</h3>
                    <ul>
                        <li><a href="mocon27">MOConference27</a></li>
                    </ul>
                </div>
                <div class="menu-section">
                    <h3>教育</h3>
                    <ul>
                        <li><a href="visionx">VisionX</a></li>
                        <li><a href="visionlive">在线教育社区</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="tool-hero">
            <h1 class="tool-hero-title">Nofeed 简索</h1>
            <p class="tool-hero-desc">格式：应用名 关键词（例如：小红书 美食 或 bilibili 教程）</p>
        </div>

        <div class="content-inner">
            <div class="search-card">
                <div contenteditable="true" id="inputArea"></div>
                <div class="hint">↵ 按下 Enter 搜索</div>
            </div>
            <div class="info-note">支持 20+ 主流平台 · 输入应用名后空格接关键词</div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ===== 应用库 (完整保留) =====
            const APPS = [
                { name: "小红书", url: "https://www.xiaohongshu.com/search_result?keyword={}", alias: ["xhs","rednote"] },
                { name: "淘宝", url: "https://s.taobao.com/search?q={}", alias: ["tb","taobao"] },
                { name: "京东", url: "https://search.jd.com/Search?keyword={}", alias: ["jd","jingdong"] },
                { name: "拼多多", url: "https://search.pinduoduo.com/s?q={}", alias: ["pdd"] },
                { name: "抖音", url: "https://www.douyin.com/search/{}", alias: ["dy","tiktok"] },
                { name: "哔哩哔哩", url: "https://search.bilibili.com/all?keyword={}", alias: ["b站","bili","bilibili"] },
                { name: "微博", url: "https://s.weibo.com/weibo?q={}", alias: ["weibo","wb"] },
                { name: "知乎", url: "https://www.zhihu.com/search?type=content&q={}", alias: ["zhihu","zh"] },
                { name: "美团", url: "https://www.meituan.com/s/?w={}", alias: ["meituan","mt"] },
                { name: "大众点评", url: "https://www.dianping.com/search/keyword/{}", alias: ["dzdp"] },
                { name: "百度", url: "https://www.baidu.com/s?wd={}", alias: ["baidu"] },
                { name: "YouTube", url: "https://www.youtube.com/results?search_query={}", alias: ["yt"] },
                { name: "微信", url: "https://weixin.sogou.com/weixin?type=2&query={}", alias: ["wechat","wx"] },
                { name: "豆瓣", url: "https://search.douban.com/book/subject_search?search_text={}", alias: ["douban"] },
                { name: "网易云音乐", url: "https://music.163.com/#/search/m/?s={}", alias: ["wyym"] },
                { name: "QQ音乐", url: "https://y.qq.com/n/ryqq/search?w={}", alias: ["qqmusic"] },
                { name: "饿了么", url: "https://www.ele.me/search/{}", alias: ["elm"] },
                { name: "得物", url: "https://www.dewu.com/search?q={}", alias: ["dewu"] },
                { name: "什么值得买", url: "https://search.smzdm.com/?c=home&s={}", alias: ["smzdm"] },
                { name: "汽车之家", url: "https://www.autohome.com.cn/search.aspx?q={}", alias: ["qczj"] },
                { name: "Chrome搜索", url: "https://www.google.com/search?q={}", alias: ["chrome","google"] },
                { name: "Safari搜索", url: "https://www.bing.com/search?q={}", alias: ["safari"] }
            ];

            const aliasMap = new Map();
            const appMap = new Map();
            for (const app of APPS) {
                appMap.set(app.name, app);
                if (app.alias) {
                    for (const a of app.alias) {
                        aliasMap.set(a.toLowerCase(), app.name);
                    }
                }
            }
            const allAppNames = APPS.map(a => a.name);

            function parseInput(raw) {
                raw = raw.trim();
                if (!raw) return null;
                const firstSpace = raw.indexOf(' ');
                if (firstSpace === -1) return null;
                const appPart = raw.slice(0, firstSpace).trim();
                const keyword = raw.slice(firstSpace + 1).trim();
                if (!appPart || !keyword) return null;
                return { appPart, keyword };
            }

            function resolveApp(appPart) {
                const lower = appPart.toLowerCase();
                if (aliasMap.has(lower)) {
                    return appMap.get(aliasMap.get(lower));
                }
                if (appMap.has(appPart)) {
                    return appMap.get(appPart);
                }
                const fuzzy = allAppNames.find(n => n.toLowerCase().includes(lower) || lower.includes(n.toLowerCase()));
                return fuzzy ? appMap.get(fuzzy) : null;
            }

            function performSearch(app, keyword) {
                const url = app.url.replace("{}", encodeURIComponent(keyword));
                window.open(url, "_blank");
            }

            function onEnter() {
                const rawText = document.getElementById("inputArea").innerText.trim();
                if (!rawText) return;
                const parsed = parseInput(rawText);
                if (!parsed) {
                    alert("格式: 应用名 关键词 (例如: 小红书 美食 或 xhs 美食)");
                    return;
                }
                const app = resolveApp(parsed.appPart);
                if (!app) {
                    alert(`未识别应用“${parsed.appPart}”，试试: 小红书 / bilibili / 淘宝 / wb`);
                    return;
                }
                performSearch(app, parsed.keyword);
            }

            // ===== 滑动引擎 =====
            const SmoothScrollEngine = {
                init: function() {
                    const menuScroll = document.getElementById('menuScroll');
                    if (menuScroll) this._applyInertiaToElement(menuScroll, 'horizontal');
                },
                _applyInertiaToElement: function(el, direction) {
                    if (!el) return;
                    let startX, scrollLeft;
                    el.addEventListener('wheel', (e) => {
                        if (direction === 'horizontal') {
                            const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
                            if (Math.abs(delta) > 2) {
                                e.preventDefault();
                                el.scrollLeft += delta * 0.5;
                            }
                        }
                    }, { passive: false });
                    el.addEventListener('touchstart', (e) => {
                        startX = e.touches[0].pageX;
                        scrollLeft = el.scrollLeft;
                    }, { passive: true });
                    el.addEventListener('touchmove', (e) => {
                        if (!startX) return;
                        const x = e.touches[0].pageX;
                        const walk = (startX - x) * 1.5;
                        el.scrollLeft = scrollLeft + walk;
                    }, { passive: true });
                    el.addEventListener('touchend', () => { startX = null; });
                }
            };

            // ===== 橡皮泥引擎 =====
            const RubberEngine = {
                breakpoints: { phone: 600, tablet: 1024, desktop: 1440 },
                currentDevice: 'desktop',
                init: function() { this._detectAndApply(); this._bindEvents(); },
                _detectAndApply: function() {
                    const width = window.innerWidth;
                    const body = document.body;
                    body.classList.remove('rubber-phone', 'rubber-tablet', 'rubber-desktop', 'rubber-wide');
                    let device;
                    if (width < this.breakpoints.phone) {
                        body.classList.add('rubber-phone'); device = 'phone';
                    } else if (width < this.breakpoints.tablet) {
                        body.classList.add('rubber-tablet'); device = 'tablet';
                    } else if (width < this.breakpoints.desktop) {
                        body.classList.add('rubber-desktop'); device = 'desktop';
                    } else {
                        body.classList.add('rubber-wide'); device = 'wide';
                    }
                    this.currentDevice = device;
                    body.setAttribute('data-rubber-device', device);
                },
                _bindEvents: function() {
                    let resizeTimer;
                    window.addEventListener('resize', () => {
                        clearTimeout(resizeTimer);
                        resizeTimer = setTimeout(() => this._detectAndApply(), 100);
                    });
                    window.addEventListener('orientationchange', () => {
                        setTimeout(() => this._detectAndApply(), 50);
                    });
                }
            };

            SmoothScrollEngine.init();
            RubberEngine.init();

            // ===== 菜单交互 =====
            const mocTitle = document.getElementById('mocTitle');
            const dropdownMenu = document.getElementById('dropdownMenu');

            mocTitle.addEventListener('click', function(e) {
                e.stopPropagation();
                const isMenuOpen = dropdownMenu.classList.contains('show');
                if (isMenuOpen) {
                    window.location.href = '/';
                } else {
                    dropdownMenu.classList.add('show');
                }
            });

            dropdownMenu.addEventListener('click', e => e.stopPropagation());
            document.addEventListener('click', function(e) {
                if (dropdownMenu.classList.contains('show')) {
                    dropdownMenu.classList.remove('show');
                }
            });

            // ===== 搜索框事件 =====
            const inputArea = document.getElementById("inputArea");
            inputArea.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    onEnter();
                }
            });
            inputArea.focus();

            window.RubberEngine = RubberEngine;
            window.SmoothScrollEngine = SmoothScrollEngine;
        })();
    </script>
</body>
</html>
